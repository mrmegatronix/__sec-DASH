<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecDash · Security Monitoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #020617; /* Obsidian */
      --bg2:       #0f172a;
      --bg3:       #1e293b;
      --surface:   #111827;
      --surface2:  #1e293b;
      --border:    rgba(244,63,94,0.15); /* Crimson tint */
      --border2:   rgba(244,63,94,0.3);
      --accent:    #f43f5e; /* Crimson */
      --accent2:   #fb7185;
      --accent3:   #fda4af;
      --green:     #10b981;
      --green2:    #34d399;
      --yellow:    #f59e0b;
      --red:       #ef4444;
      --text:      #f8fafc;
      --text2:     #cbd5e1;
      --text3:     #94a3b8;
      --radius:    14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Tactical Background Grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(244,63,94,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244,63,94,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #be123c, #f43f5e);
      box-shadow: 0 0 15px rgba(244,63,94,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .brand-text h1 {
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fda4af, #f43f5e, #be123c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-bar {
      display: flex; gap: 5px; background: var(--surface); padding: 5px;
      border-radius: 12px; border: 1px solid var(--border);
    }
    .nav-link {
      padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      color: var(--text2); text-decoration: none; transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: #fff; background: var(--accent); }

    .status-pill {
      display: flex; align-items: center; gap: 8px; padding: 6px 14px;
      border-radius: 100px; background: #000; border: 1px solid var(--border2);
      font-size: 0.8rem; color: var(--accent2); font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
    .status-dot.scanning { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 1.2s infinite; }
    .status-dot.done { background: var(--green); box-shadow: 0 0 8px var(--green); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat-card {
      flex: 1; min-width: 130px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px; display: flex; flex-direction: column; gap: 4px;
    }
    .stat-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; }
    .stat-value { font-size: 1.8rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--text); }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 28px; }
    .input-group {
      display: flex; align-items: center; gap: 8px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 14px;
    }
    .input-group label { font-size: 0.75rem; font-weight: 700; color: var(--text3); text-transform: uppercase; }
    .input-group input, .input-group select {
      background: none; border: none; color: var(--text); font-family: 'JetBrains Mono', monospace;
      padding: 10px 0; outline: none; width: 170px;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px;
      border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; transition: all 0.2s;
      text-transform: uppercase; font-size: 0.8rem;
    }
    .btn-primary { background: linear-gradient(135deg, #be123c, #f43f5e); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

    .progress-wrap { height: 4px; background: #000; border-radius: 99px; overflow: hidden; margin-bottom: 28px; border: 1px solid var(--border); }
    .progress-bar { height: 100%; background: var(--accent); transition: width 0.15s; }

    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 22px; }
    .chip { padding: 6px 14px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; background: var(--surface); border: 1px solid var(--border); color: var(--text2); cursor: pointer; text-transform: uppercase; }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #search-box { margin-left: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 16px; color: var(--text); outline: none; transition: 0.2s; }
    #search-box:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(244,63,94,0.1); }

    #hosts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

    .host-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; display: flex; flex-direction: column; gap: 16px; animation: fadeUp 0.35s ease both;
      transition: 0.3s;
    }
    .host-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--bg2); border: 1px solid var(--border); font-size: 1.2rem; }
    .card-title-wrap { flex: 1; min-width: 0; }
    .card-ip { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .card-hostname { font-size: 0.8rem; color: var(--text3); margin-top: 2px; }

    .badge { padding: 3px 10px; border-radius: 100px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-clear { background: rgba(16,185,129,0.15); color: var(--green2); border: 1px solid rgba(16,185,129,0.2); }
    .badge-warn { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
    .badge-critical { background: rgba(244,63,94,0.15); color: var(--accent2); border: 1px solid rgba(244,63,94,0.2); }
    .badge-new { background: var(--accent); color: white; display: none; }

    .ports-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .port-tag {
      padding: 5px 12px; border-radius: 8px; background: #000; border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text2); 
    }
    .port-risky { border-color: var(--accent); color: var(--accent2); }

    .meta-row { display: flex; justify-content: space-between; gap: 14px; border-top: 1px solid var(--border); padding-top: 15px; }
    .meta-item { font-size: 0.7rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-weight: 500; }

    #scan-log { background: #000; border-radius: var(--radius); padding: 15px; margin-top: 24px; max-height: 180px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--text3); border: 1px solid var(--border); }

    /* PiP Styling */
    .pip-toggle {
        position: fixed; bottom: 30px; left: 30px; z-index: 5000;
        background: var(--accent); color: white; border: none;
        padding: 12px 24px; border-radius: 50px; font-weight: 900; cursor: pointer;
        box-shadow: 0 10px 25px rgba(244, 63, 94, 0.4); font-size: 0.8rem;
        display: flex; align-items: center; gap: 8px; transition: 0.2s;
    }
    .pip-toggle:hover { transform: scale(1.05); }
    .pip-window {
        position: fixed; bottom: 90px; left: 30px; width: 380px; height: 220px;
        background: #000; border: 2px solid var(--accent); border-radius: 15px;
        z-index: 5000; overflow: hidden; display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        animation: pipIn 0.3s ease;
    }
    @keyframes pipIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .pip-window iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div class="brand-text"><h1>SecDash <span style="font-size: 0.7rem; color: var(--text3); vertical-align: middle;">v1.0</span></h1></div>
    </div>
    <nav class="nav-bar">
      <a href="index.html" class="nav-link active">Security Scan</a>
      <a href="links.html" class="nav-link">Intel Hub</a>
    </nav>
    <div class="status-pill"><span class="status-dot" id="status-dot"></span><span id="status-text">Ready</span></div>
  </header>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Network Nodes</div><div class="stat-value" id="stat-scanned">0</div></div>
    <div class="stat-card"><div class="stat-label">Active Hosts</div><div class="stat-value" id="stat-found">0</div></div>
    <div class="stat-card"><div class="stat-label">Vulnerabilities</div><div class="stat-value" id="stat-ports" style="color: var(--accent);">0</div></div>
  </div>

  <div class="controls">
    <div class="input-group"><label>Subnet</label><input id="subnet-input" type="text" value="192.168.1"></div>
    <div class="input-group">
      <label>Preset</label>
      <select id="port-preset">
        <option value="infrastructure">Infrastructure (Core)</option>
        <option value="vulnerability">Vulnerability (Legacy)</option>
        <option value="cctv">CCTV / IoT</option>
        <option value="full">Full Audit (Top 100)</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startScan()" id="scan-btn">Initiate Audit</button>
    <button class="btn btn-secondary" onclick="stopScan()" id="stop-btn" style="display:none">Abort</button>
  </div>

  <div class="progress-wrap hidden" id="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <div class="toolbar">
    <button class="chip active" onclick="setFilter('all')">All Targets</button>
    <button class="chip" onclick="setFilter('risk')">⚠️ At Risk</button>
    <input type="text" id="search-box" placeholder="🔍 Search Host or Vulnerability…" oninput="renderCards()">
  </div>

  <div id="hosts-grid"></div>
  <div id="scan-log"></div>

  <!-- PiP Elements -->
  <div id="pip-window" class="pip-window">
      <iframe id="pip-frame" src=""></iframe>
  </div>
  <button class="pip-toggle" onclick="togglePip()">
      <span style="font-size: 1.2rem;">📺</span> 
      <span>LIVE VIEW</span>
  </button>
</div>

<script>
const PORT_PRESETS = {
  infrastructure: [22, 80, 443, 8080, 8443, 53, 161, 3000],
  vulnerability: [21, 23, 137, 139, 445, 3389, 5900, 111],
  cctv: [80, 81, 88, 554, 34567, 37777, 8000, 8100, 9000],
  full: [21, 22, 23, 25, 53, 80, 110, 111, 135, 139, 143, 443, 445, 548, 587, 631, 993, 995, 1025, 1723, 1883, 2049, 3000, 3001, 3128, 3306, 3389, 4000, 5000, 5060, 5173, 5432, 5900, 5984, 6379, 8000, 8008, 8080, 8081, 8443, 8888, 9000, 9090, 9100, 9443, 27017]
};

const PORT_INTEL = { 
  21: { name: 'FTP', risk: 'HIGH', desc: 'Plaintext file transfer' },
  22: { name: 'SSH', risk: 'LOW', desc: 'Secure management' },
  23: { name: 'Telnet', risk: 'CRITICAL', desc: 'Legacy remote access' },
  80: { name: 'HTTP', risk: 'MED', desc: 'Insecure web service' },
  443: { name: 'HTTPS', risk: 'LOW', desc: 'Encrypted web service' },
  445: { name: 'SMB', risk: 'HIGH', desc: 'File sharing' },
  3389: { name: 'RDP', risk: 'HIGH', desc: 'Remote Desktop' },
  5900: { name: 'VNC', risk: 'HIGH', desc: 'Screen sharing' },
  8080: { name: 'Web-Alt', risk: 'MED', desc: 'Non-standard web' },
  554: { name: 'RTSP', risk: 'MED', desc: 'Media stream' }
};

let discovered = [], scanning = false, abortCtl = null, doneProbes = 0, totalProbes = 0, filterMode = 'all';
const knownHosts = JSON.parse(localStorage.getItem('secdash_known_hosts') || '[]');

function isHttps(p) { return [443, 8443, 9443, 4443].includes(p); }
function portUrl(ip, p) { return `${isHttps(p)?'https':'http'}://${ip}:${p}`; }

async function startScan() {
  if (scanning) return;
  scanning = true; doneProbes = 0;
  abortCtl = new AbortController();
  setStatus('scanning');
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('stop-btn').style.display = '';
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('hosts-grid').innerHTML = '';
  
  const subnet = document.getElementById('subnet-input').value;
  const ports = PORT_PRESETS[document.getElementById('port-preset').value];
  const hosts = Array.from({length: 254}, (_, i) => `${subnet}.${i+1}`);
  totalProbes = hosts.length * ports.length;

  const BATCH_SIZE = 35; 
  for (let i = 0; i < hosts.length; i++) {
    if (abortCtl.signal.aborted) break;
    const ip = hosts[i];
    
    for (let j = 0; j < ports.length; j += BATCH_SIZE) {
        const batch = ports.slice(j, j + BATCH_SIZE);
        await Promise.all(batch.map(async p => {
            const start = Date.now();
            try {
                const ac = new AbortController();
                const tid = setTimeout(() => ac.abort(), 1200);
                await fetch(portUrl(ip, p), { mode:'no-cors', signal: ac.signal });
                clearTimeout(tid);
                mergeHost(ip, { port: p, ms: Date.now() - start });
            } catch(e) {}
            doneProbes++;
            updateProgress();
        }));
    }
    document.getElementById('stat-scanned').textContent = i + 1;
  }
  finishScan();
}

function stopScan() { abortCtl && abortCtl.abort(); finishScan(); }
function finishScan() {
  scanning = false;
  document.getElementById('scan-btn').disabled = false;
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('progress-wrap').classList.add('hidden');
  setStatus('done');
  
  // Persist known hosts
  const currentIps = discovered.map(h => h.ip);
  const newKnown = Array.from(new Set([...knownHosts, ...currentIps]));
  localStorage.setItem('secdash_known_hosts', JSON.stringify(newKnown));
}

function setStatus(s) { document.getElementById('status-dot').className = 'status-dot ' + s; document.getElementById('status-text').textContent = s; }
function updateProgress() { document.getElementById('progress-bar').style.width = (doneProbes / totalProbes * 100) + '%'; }

function mergeHost(ip, data) {
  let h = discovered.find(x => x.ip === ip);
  if (!h) { 
    h = { 
        ip, 
        ports:[], 
        firstSeen: new Date().toLocaleTimeString(), 
        isNew: !knownHosts.includes(ip)
    }; 
    discovered.push(h); 
  }
  if (!h.ports.find(x => x.port === data.port)) h.ports.push(data);
  h.ports.sort((a,b) => a.port - b.port);
  updateCard(h);
  resolveMetadata(h, data.port);
}

async function resolveMetadata(h, p) {
  const url = portUrl(h.ip, p);
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(2000) });
    const text = await res.text();
    const m = text.match(/<title>([^<]+)<\/title>/i);
    if (m) { h.hostname = m[1].trim(); updateCard(h); }
  } catch(e) {}
}

function updateCard(h) {
  const grid = document.getElementById('hosts-grid');
  let el = document.getElementById('card-' + h.ip.replace(/\./g, '-'));
  if (!el) { grid.insertAdjacentHTML('beforeend', `<div id="card-${h.ip.replace(/\./g, '-')}"></div>`); el = document.getElementById('card-' + h.ip.replace(/\./g, '-')); }
  el.outerHTML = buildCard(h);
  document.getElementById('stat-found').textContent = discovered.length;
  
  const riskyCount = discovered.filter(host => host.ports.some(p => PORT_INTEL[p.port]?.risk === 'HIGH' || PORT_INTEL[p.port]?.risk === 'CRITICAL')).length;
  document.getElementById('stat-ports').textContent = riskyCount;
}

function buildCard(h) {
  const title = h.hostname || h.ip;
  const sub = h.hostname ? h.ip : `Node Discovered: ${h.firstSeen}`;
  
  let maxRisk = 'CLEAR';
  h.ports.forEach(p => {
      const intel = PORT_INTEL[p.port];
      if (intel) {
          if (intel.risk === 'CRITICAL') maxRisk = 'CRITICAL';
          else if (intel.risk === 'HIGH' && maxRisk !== 'CRITICAL') maxRisk = 'WARN';
          else if (intel.risk === 'MED' && maxRisk === 'CLEAR') maxRisk = 'WARN';
      }
  });

  const badgeClass = maxRisk === 'CRITICAL' ? 'badge-critical' : (maxRisk === 'WARN' ? 'badge-warn' : 'badge-clear');

  return `
    <div class="host-card" id="card-${h.ip.replace(/\./g, '-')}">
      <div class="card-header">
        <div class="card-icon">${h.isNew ? '⚠️' : '🖥️'}</div>
        <div class="card-title-wrap">
          <div class="card-ip">${title}</div>
          <div class="card-hostname">${sub}</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
            <span class="badge ${badgeClass}">${maxRisk}</span>
            ${h.isNew ? '<span class="badge" style="background:var(--accent); color:white; font-size:0.55rem;">NEW NODE</span>' : ''}
        </div>
      </div>
      <div class="ports-row">
        ${h.ports.map(p => {
          const intel = PORT_INTEL[p.port];
          const risky = intel?.risk === 'HIGH' || intel?.risk === 'CRITICAL';
          return `<span class="port-tag ${risky ? 'port-risky' : ''}" title="${intel?.desc || ''}">${p.port} ${intel?.name || ''}</span>`;
        }).join('')}
      </div>
      <div class="meta-row">
        <span class="meta-item">Latency: ${h.ports[0].ms}ms</span>
        <span class="meta-item">${h.ports.length} Service${h.ports.length>1?'s':''}</span>
      </div>
    </div>`;
}

function setFilter(f) { 
  filterMode = f; 
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.innerText.toLowerCase().includes(f)));
  renderCards(); 
}

function renderCards() {
  const query = document.getElementById('search-box').value.toLowerCase();
  const grid = document.getElementById('hosts-grid');
  grid.innerHTML = discovered
    .filter(h => {
        if (filterMode === 'risk') return h.ports.some(p => PORT_INTEL[p.port]?.risk === 'HIGH' || PORT_INTEL[p.port]?.risk === 'CRITICAL');
        return true;
    })
    .filter(h => h.ip.includes(query) || (h.hostname && h.hostname.toLowerCase().includes(query)))
    .map(h => buildCard(h)).join('');
}

// PiP Controller
function togglePip(forceState) {
    const win = document.getElementById('pip-window');
    const frame = document.getElementById('pip-frame');
    const isOpen = forceState !== undefined ? !forceState : win.style.display === 'block';

    if (isOpen) {
        win.style.display = 'none';
        frame.src = '';
        localStorage.setItem('secdash_pip_open', 'false');
    } else {
        win.style.display = 'block';
        frame.src = 'links.html'; 
        localStorage.setItem('secdash_pip_open', 'true');
    }
}

if (localStorage.getItem('secdash_pip_open') === 'true') {
    togglePip(true);
}
</script>
</body>
</html>
